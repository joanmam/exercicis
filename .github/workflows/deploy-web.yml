name: Desplega a Firebase (Hosting + regles)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instal·la dependències
        run: npm install

      - name: Build del web
        run: npm run web:build

      - name: Desplega a Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,firestore:rules
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: exercicis-6e7a7
